function splitJapaneseRuns(text){const runs=[];let i=0;while(i<text.length){const type=KANJI_RE.test(text[i])?"kanji":"text";let value="";while(i<text.length&&(KANJI_RE.test(text[i])?"kanji":"text")===type)value+=text[i++];runs.push({type,value})}return runs}

function rubyFromReviewedKana(text,kana){text=field(text);kana=field(kana);if(!text||!kana||!hasKanjiText(text))return"";const runs=splitJapaneseRuns(text);function walk(index,kanaIndex){if(index>=runs.length)return kanaIndex===kana.length?"":null;const run=runs[index];if(run.type==="text"){for(const candidate of literalKanaVariants(run.value)){if(kana.startsWith(candidate,kanaIndex)){const rest=walk(index+1,kanaIndex+candidate.length);if(rest!==null)return escapeHtml(run.value)+rest}}return null}for(let end=kana.length;end>kanaIndex;end--){const reading=kana.slice(kanaIndex,end),rest=walk(index+1,end);if(rest!==null)return"<ruby>"+escapeHtml(run.value)+"<rt>"+escapeHtml(reading)+"</rt></ruby>"+rest}return null}return walk(0,0)||""}
function exampleDisplayText(c){let text=example(c,"ja"),kana=example(c,"kana");if(/^Target sentence is the audio-ready example\.?$/i.test(text)&&hasJapaneseText(c.target))text=field(c.target);if(kana&&text.includes(",")){const prefix=text.split(",")[0].trim();if(prefix&&hasJapaneseText(prefix))text=prefix}return text}
function exampleJaBlock(text,reviewedKana){if(!text)return"";const ruby=rubyFromReviewedKana(text,reviewedKana),fallback=field(reviewedKana),helper=!ruby&&fallback&&hasKanjiText(text)?"<p class=\"example-kana\">よみ："+escapeHtml(fallback)+"</p>":"";return"<div class=\"example-box\"><p class=\"example-ja\">"+(ruby||annotateJapanese(text))+"</p>"+helper+"</div>"}
function normalizeUi(){if(!THEME_LABELS[ui.theme])ui.theme="bridge";if(!ui.mode)ui.mode="all";if(!ui.section)ui.section="all";ui.maxNew=parseInt(ui.maxNew,10);if(!Number.isFinite(ui.maxNew)||ui.maxNew<1)ui.maxNew=20;ui.maxNew=Math.min(100,ui.maxNew)}
function loadUi(){try{ui={...ui,...JSON.parse(localStorage.getItem(UI_KEY)||"{}")} }catch{}normalizeUi()}
function saveUi(){normalizeUi();localStorage.setItem(UI_KEY,JSON.stringify(ui))}
function loadProgress(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");if(saved.progress&&typeof saved.progress==="object")appState={currentId:saved.currentId||null,progress:saved.progress}}catch{appState={currentId:null,progress:{}}}}
function saveProgress(){localStorage.setItem(STORAGE_KEY,JSON.stringify({schema_version:2,deck_id:"jft_ssw_work_japan",pack_id:DEFAULT_PACK,currentId:appState.currentId,progress:appState.progress,updatedAt:new Date().toISOString()}))}
function stateFor(id){return appState.progress[id]?.state||"new"}
function engineFor(id){return appState.progress[id]?.engine||null}
function ensureProgress(id){if(!appState.progress[id]){const engineState=SREngine.createCard(id);appState.progress[id]={card_id:id,state:"new",wrong_count:0,right_count:0,last_reviewed_at:null,next_due_at:null,history:[],engine:engineState}}return appState.progress[id]}
function isEngineDue(engine,now=new Date()){try{return engine?SREngine.isDue(engine,now):false}catch{return fallbackEngine.isDue(engine,now)}}
function baseFilteredCards(){return cards.filter(c=>(ui.mode==="all"||c.mode===ui.mode)&&(ui.section==="all"||c.jft_section===ui.section))}
function dueCards(){const now=new Date();return baseFilteredCards().filter(c=>stateFor(c.id)!=="new"&&isEngineDue(engineFor(c.id),now))}
function newCards(){return baseFilteredCards().filter(c=>stateFor(c.id)==="new").slice(0,ui.maxNew)}
function studyQueue(){const due=dueCards();return[...due,...newCards()]}
function currentCard(){const list=studyQueue();return list.find(c=>c.id===appState.currentId)||list[0]||null}
function selectFirstAvailable(){const list=studyQueue();if(!list.length){appState.currentId=null;return}if(!list.some(c=>c.id===appState.currentId))appState.currentId=list[0].id}
function populateFilters(){const modes=[...new Set(cards.map(c=>c.mode).filter(Boolean))],sections=[...new Set(cards.map(c=>c.jft_section).filter(Boolean))];els.modeFilter.innerHTML="<option value=\"all\">All modes</option>"+modes.map(m=>"<option value=\""+escapeHtml(m)+"\">"+escapeHtml(MODE_LABELS[m]||m)+"</option>").join("");els.sectionFilter.innerHTML="<option value=\"all\">All JFT/SSW sections</option>"+sections.map(s=>"<option value=\""+escapeHtml(s)+"\">"+escapeHtml(SECTION_LABELS[s]||s)+"</option>").join("")}
function applyUi(){normalizeUi();document.body.className="theme-"+ui.theme;els.settingsPanel.hidden=!ui.settingsOpen;els.settingsBtn.setAttribute("aria-expanded",String(ui.settingsOpen));els.themeSelect.value=ui.theme;els.romajiToggle.textContent="Romaji: "+(ui.showRomaji?"On":"Off");els.englishToggle.textContent="English: "+(ui.showEnglish?"On":"Off");els.modeFilter.value=ui.mode;els.sectionFilter.value=ui.section;els.newLimitInput.value=ui.maxNew;els.settingsSummary.textContent=(ui.mode==="all"?"All modes":MODE_LABELS[ui.mode]||ui.mode)+" · "+(ui.section==="all"?"All sections":SECTION_LABELS[ui.section]||ui.section)+" · "+THEME_LABELS[ui.theme];els.engineStatusLine.textContent=engineConnected?"Engine connected: ES module exports found and loaded.":"Engine fallback active: "+engineError}
function render(){applyUi();selectFirstAvailable();renderSummary();renderCard(showBack);renderBrowse();els.cardCount.textContent=cards.length?cards.length+" cards":"No cards";els.exportBtn.disabled=!cards.length}
function renderSummary(){const base=baseFilteredCards(),due=dueCards();let counts={new:0,learning:0,review:due.length,mastered:0,answered:0};base.forEach(c=>{const st=stateFor(c.id),p=appState.progress[c.id];if(st==="new")counts.new++;if(st==="learning")counts.learning++;if(st==="mastered")counts.mastered++;if(p&&(p.right_count||p.wrong_count||p.history?.length))counts.answered++});els.topNewCount.textContent=counts.new;els.topReviewCount.textContent=counts.review;els.topLearningCount.textContent=counts.learning;els.masteredCount.textContent=counts.mastered;els.answeredCount.textContent=counts.answered}
function renderCard(backVisible){const card=currentCard(),list=studyQueue();if(!card){els.cardPosition.textContent="Card 0/0";els.cardStatus.textContent="Done";els.frontFace.innerHTML="<div class=\"empty\"><h2>All due cards are done.</h2><p>Change filters or raise the new-card limit in settings if you want more cards now.</p></div>";els.backFace.hidden=true;setStudyButtons(false,false);return}const pos=Math.max(0,list.findIndex(i=>i.id===card.id))+1;els.cardPosition.textContent="Card "+pos+"/"+list.length;els.cardStatus.textContent=queueStatus(card);els.frontFace.innerHTML=backVisible?renderFrontReference(card):renderFront(card);els.backFace.innerHTML=renderBack(card);els.backFace.hidden=!backVisible;setStudyButtons(true,backVisible)}
function queueStatus(card){const st=stateFor(card.id);if(st==="new")return"New";if(isEngineDue(engineFor(card.id)))return"Review";return st.replace(/^./,c=>c.toUpperCase())}
function setStudyButtons(hasCard,answerShown){els.showAnswerBtn.hidden=!hasCard||answerShown;els.showAnswerBtn.disabled=!hasCard||answerShown;els.reviewActions.hidden=!hasCard||!answerShown}
const taskLabel=c=>"<p class=\"task-label\">"+escapeHtml(TASK_LABELS[c.mode]||"Task")+"</p>";
function audioChip(c){return c.audio?.needs_recording||c.mode==="listening_ready"?"<span class=\"audio-chip\">♪ Audio planned</span>":""}
function badges(c){const v=[MODE_LABELS[c.mode]||c.mode,SECTION_LABELS[c.jft_section]||c.jft_section,humanize(c.scenario)].filter(Boolean).slice(0,3);return"<div class=\"tags\">"+v.map(x=>"<span class=\"tag\">"+escapeHtml(x)+"</span>").join("")+"</div>"}
function romaji(c){return ui.showRomaji&&c.romaji?"<p class=\"romaji\">"+escapeHtml(c.romaji)+"</p>":""}function english(v,cls="meaning-secondary"){return ui.showEnglish&&v?"<p class=\""+cls+"\">"+escapeHtml(v)+"</p>":""}function reading(c){return c.reading?"<p class=\"reading\">"+escapeHtml(c.reading)+"</p>":""}
function renderFrontReference(c){if(c.mode==="production")return"<div class=\"front-reference\">"+taskLabel(c)+"<p class=\"prompt-main\">"+escapeHtml(promptText(c,"id")||meaning(c,"id"))+"</p>"+english(promptText(c,"en"))+"</div>";if(c.mode==="information_search_mini")return"<div class=\"front-reference\">"+taskLabel(c)+"<div class=\"notice-box\">"+escapeHtml(c.target)+"</div></div>";if(c.mode==="kanji_sign_reading")return"<div class=\"front-reference\">"+taskLabel(c)+"<h2 class=\"target sign\">"+escapeHtml(c.target)+"</h2></div>";return"<div class=\"front-reference\">"+taskLabel(c)+"<h2 class=\"target\">"+escapeHtml(c.target)+"</h2>"+reading(c)+romaji(c)+audioChip(c)+"</div>"}
function renderFront(c){if(c.mode==="production")return taskLabel(c)+"<p class=\"prompt-main\">"+escapeHtml(promptText(c,"id")||meaning(c,"id"))+"</p>"+english(promptText(c,"en"))+badges(c);if(c.mode==="kanji_sign_reading")return taskLabel(c)+"<h2 class=\"target sign\">"+escapeHtml(c.target)+"</h2>"+badges(c);if(c.mode==="listening_ready")return taskLabel(c)+"<h2 class=\"target\">"+escapeHtml(c.target)+"</h2>"+audioChip(c)+badges(c);if(c.mode==="information_search_mini")return taskLabel(c)+"<div class=\"notice-box\">"+escapeHtml(c.target)+"</div><div class=\"question-box\"><strong>Question</strong><p class=\"prompt-main\" style=\"font-size:1.08rem\">"+escapeHtml(promptText(c,"id"))+"</p>"+english(promptText(c,"en"))+"</div>"+badges(c);return taskLabel(c)+"<h2 class=\"target\">"+escapeHtml(c.target)+"</h2>"+reading(c)+romaji(c)+audioChip(c)+badges(c)}
function renderBack(c){const ja=answer(c,"ja")||c.target,id=answer(c,"id")||meaning(c,"id"),en=answer(c,"en")||meaning(c,"en");if(c.mode==="information_search_mini")return"<div class=\"answer-box\"><p class=\"meaning-id\">"+escapeHtml(ja||en)+"</p>"+english(en)+"</div>"+supportBlock(c);if(c.mode==="production")return"<h2 class=\"target\">"+escapeHtml(ja)+"</h2>"+reading(c)+romaji(c)+audioChip(c)+"<p class=\"meaning-id\">"+escapeHtml(id)+"</p>"+english(en)+supportBlock(c);if(c.mode==="kanji_sign_reading")return reading(c)+romaji(c)+"<p class=\"meaning-id\">"+escapeHtml(id)+"</p>"+english(en)+supportBlock(c);return"<p class=\"meaning-id\">"+escapeHtml(meaning(c,"id"))+"</p>"+english(meaning(c,"en"))+supportBlock(c)}
function supportBlock(c){const exJa=exampleDisplayText(c),exKana=example(c,"kana"),exId=example(c,"id"),exEn=example(c,"en"),note=field(c.usage_note&&(c.usage_note.id||c.usage_note.en||c.usage_note.ja));return exampleJaBlock(exJa,exKana)+(exId?"<p class=\"meaning-secondary\">"+escapeHtml(exId)+"</p>":"")+english(exEn)+(note?"<p class=\"note\">"+escapeHtml(note)+"</p>":"")}
function renderBrowse(){const q=els.searchInput.value.trim().toLowerCase();const list=baseFilteredCards().filter(c=>!q||JSON.stringify([c.id,c.target,c.reading,c.romaji,c.meaning,c.prompt,c.expected_answer,c.example,c.scenario,c.jft_section]).toLowerCase().includes(q));els.browseList.innerHTML=list.map(c=>"<button class=\"row\" type=\"button\" data-card-id=\""+escapeHtml(c.id)+"\"><span class=\"row-title\">"+escapeHtml(c.target)+"</span><span class=\"row-meta\">"+escapeHtml(c.id)+" · "+escapeHtml(MODE_LABELS[c.mode]||c.mode)+" · "+escapeHtml(SECTION_LABELS[c.jft_section]||c.jft_section)+" · "+escapeHtml(humanize(c.scenario))+"</span></button>").join("")||"<p>No cards match.</p>"}
function gradeCurrent(kind){const card=currentCard();if(!card)return;const before=studyQueue(),beforeIndex=Math.max(0,before.findIndex(i=>i.id===card.id)),r=ensureProgress(card.id);const quality=kind==="again"?1:kind==="hard"?2:kind==="good"?3:5;if(kind==="again")r.wrong_count+=1;else r.right_count+=1;const now=new Date();r.last_reviewed_at=now.toISOString();r.history.push({at:r.last_reviewed_at,grade:kind});try{r.engine=SREngine.reviewCard(r.engine||SREngine.createCard(card.id),quality,now);const due=new Date(r.engine.due);r.next_due_at=due.toISOString();if(quality<3)r.state="learning";else if(r.engine.repetitions>=4)r.state="mastered";else if(r.engine.repetitions>=2)r.state="review";else r.state="learning";setStatusLine(card.id+" marked "+kind+". Next due: "+formatDue(due)+".")}catch(error){r.state=kind==="again"||kind==="hard"?"learning":kind==="good"?"review":"mastered";setStatusLine("Saved, but engine update failed: "+(error?.message||error))}moveAfterGrade(beforeIndex)}
function moveAfterGrade(previousIndex){const nextList=studyQueue();if(!nextList.length){appState.currentId=null;showBack=false;saveProgress();render();return}appState.currentId=nextList[Math.min(previousIndex,nextList.length-1)].id;showBack=false;saveProgress();render()}
function formatDue(date){const d=new Date(date),now=new Date(),diff=d.getTime()-now.getTime();if(diff<3600000)return"soon";if(diff<86400000)return"later today";return d.toLocaleDateString(undefined,{month:"short",day:"numeric"})}
function setStatusLine(t){els.statusLine.textContent=t}
function exportProgress(){const payload={app:"jft-ssw-stage1b",schema_version:2,exportedAt:new Date().toISOString(),...appState},blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download="jft-ssw-stage1b-progress-v2.json";link.click();URL.revokeObjectURL(url);setStatusLine("Progress exported.")}
function importProgress(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const imported=JSON.parse(String(reader.result));if(imported.progress&&typeof imported.progress==="object")appState={currentId:imported.currentId||appState.currentId,progress:imported.progress};saveProgress();render();setStatusLine("Progress imported.")}catch{setStatusLine("Could not import this file.")}};reader.readAsText(file)}
async function loadCards(){loadUi();loadProgress();try{const manifest=await fetch(MANIFEST_URL,{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error("manifest "+r.status);return r.json()}),packs=manifest.decks.flatMap(d=>d.packs||[]),pack=packs.find(p=>p.pack_id===DEFAULT_PACK),file=pack?.card_file||"data/cards.stage1b.id.sample.json",data=await fetch(file,{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error("cards "+r.status);return r.json()});cards=Array.isArray(data)?data:(data.cards||[]);populateFilters();render();setStatusLine("Stage 1B cards loaded.")}catch(error){console.error(error);setStatusLine("Could not load Stage 1B cards: "+error.message);render()}}
els.settingsBtn.addEventListener("click",()=>{ui.settingsOpen=!ui.settingsOpen;saveUi();render()});els.closeSettingsBtn.addEventListener("click",()=>{ui.settingsOpen=false;saveUi();render()});
els.showAnswerBtn.addEventListener("click",()=>{showBack=true;render()});els.againBtn.addEventListener("click",()=>gradeCurrent("again"));els.hardBtn.addEventListener("click",()=>gradeCurrent("hard"));els.goodBtn.addEventListener("click",()=>gradeCurrent("good"));els.easyBtn.addEventListener("click",()=>gradeCurrent("easy"));
els.modeFilter.addEventListener("change",e=>{ui.mode=e.target.value;showBack=false;saveUi();render()});els.sectionFilter.addEventListener("change",e=>{ui.section=e.target.value;showBack=false;saveUi();render()});els.themeSelect.addEventListener("change",e=>{ui.theme=e.target.value;saveUi();render()});els.romajiToggle.addEventListener("click",()=>{ui.showRomaji=!ui.showRomaji;saveUi();render()});els.englishToggle.addEventListener("click",()=>{ui.showEnglish=!ui.showEnglish;saveUi();render()});els.newLimitInput.addEventListener("change",e=>{ui.maxNew=parseInt(e.target.value,10)||20;showBack=false;saveUi();render()});els.searchInput.addEventListener("input",renderBrowse);els.browseList.addEventListener("click",e=>{const row=e.target.closest("[data-card-id]");if(!row)return;appState.currentId=row.dataset.cardId;showBack=false;ui.settingsOpen=false;saveProgress();saveUi();render()});els.exportBtn.addEventListener("click",exportProgress);els.importInput.addEventListener("change",e=>importProgress(e.target.files[0]));els.resetBtn.addEventListener("click",()=>{if(!confirm("Reset local progress for this browser?"))return;appState.progress={};appState.currentId=null;saveProgress();render();setStatusLine("Local progress reset.")});
if("serviceWorker" in navigator&&window.isSecureContext)navigator.serviceWorker.register("sw.js").catch(()=>{});
loadCards();
</script>
